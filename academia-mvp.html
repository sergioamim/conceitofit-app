<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FitManager — Gestão de Academia</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0f11;
      --surface: #16181c;
      --surface2: #1e2026;
      --border: #2a2d35;
      --accent: #c8f135;
      --accent2: #3de8a0;
      --danger: #ff5c5c;
      --warning: #ffb347;
      --text: #eef0f4;
      --text2: #8a8f9e;
      --text3: #5a5f6e;
      --font-display: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
      --radius: 12px;
      --radius-sm: 8px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* LAYOUT */
    .app { display: flex; height: 100vh; overflow: hidden; }

    /* SIDEBAR */
    .sidebar {
      width: 220px;
      min-width: 220px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 0;
    }
    .sidebar-logo {
      padding: 24px 20px 20px;
      border-bottom: 1px solid var(--border);
    }
    .logo-text {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 20px;
      color: var(--accent);
      letter-spacing: -0.5px;
    }
    .logo-sub {
      font-size: 11px;
      color: var(--text3);
      margin-top: 2px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    .sidebar-nav {
      flex: 1;
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .nav-section {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text3);
      padding: 12px 8px 6px;
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      color: var(--text2);
      font-size: 13.5px;
      font-weight: 400;
      transition: all 0.15s;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
    }
    .nav-item:hover { background: var(--surface2); color: var(--text); }
    .nav-item.active {
      background: rgba(200, 241, 53, 0.1);
      color: var(--accent);
      font-weight: 500;
    }
    .nav-icon { font-size: 16px; width: 20px; text-align: center; }

    .sidebar-bottom {
      padding: 16px 12px;
      border-top: 1px solid var(--border);
    }
    .user-pill {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: var(--radius-sm);
      background: var(--surface2);
    }
    .user-avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: var(--accent);
      color: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 12px;
      font-family: var(--font-display);
    }
    .user-name { font-size: 13px; font-weight: 500; }
    .user-role { font-size: 11px; color: var(--text3); }

    /* MAIN */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .topbar {
      padding: 18px 28px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
    }
    .page-title {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }
    .page-subtitle { font-size: 13px; color: var(--text2); margin-top: 1px; }
    .topbar-actions { display: flex; gap: 10px; align-items: center; }

    .content {
      flex: 1;
      overflow-y: auto;
      padding: 28px;
    }

    /* BUTTONS */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 9px 16px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
      font-family: var(--font-body);
    }
    .btn-primary {
      background: var(--accent);
      color: var(--bg);
    }
    .btn-primary:hover { background: #d4f54a; }
    .btn-ghost {
      background: transparent;
      color: var(--text2);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { background: var(--surface2); color: var(--text); }
    .btn-danger { background: rgba(255,92,92,0.15); color: var(--danger); border: 1px solid rgba(255,92,92,0.3); }

    /* CARDS */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }

    /* GRID */
    .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }

    /* STAT CARDS */
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      position: relative;
      overflow: hidden;
    }
    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
    }
    .stat-card.green::before { background: var(--accent); }
    .stat-card.teal::before { background: var(--accent2); }
    .stat-card.red::before { background: var(--danger); }
    .stat-card.orange::before { background: var(--warning); }

    .stat-label {
      font-size: 12px;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    .stat-value {
      font-family: var(--font-display);
      font-size: 32px;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 6px;
    }
    .stat-change {
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .stat-change.up { color: var(--accent2); }
    .stat-change.down { color: var(--danger); }
    .stat-icon {
      position: absolute;
      top: 16px;
      right: 16px;
      font-size: 24px;
      opacity: 0.2;
    }

    /* TABLE */
    .table-container {
      overflow-x: auto;
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }
    table { width: 100%; border-collapse: collapse; }
    thead tr { border-bottom: 1px solid var(--border); }
    th {
      padding: 12px 16px;
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text3);
      background: var(--surface2);
    }
    td { padding: 13px 16px; border-bottom: 1px solid var(--border); font-size: 13.5px; }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: rgba(255,255,255,0.02); }

    /* BADGES */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 3px 9px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.2px;
    }
    .badge-green { background: rgba(61,232,160,0.15); color: var(--accent2); }
    .badge-red { background: rgba(255,92,92,0.15); color: var(--danger); }
    .badge-yellow { background: rgba(255,179,71,0.15); color: var(--warning); }
    .badge-gray { background: var(--surface2); color: var(--text2); }

    /* SEARCH */
    .search-input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 9px 14px 9px 36px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 13.5px;
      width: 260px;
      transition: all 0.15s;
    }
    .search-input:focus {
      outline: none;
      border-color: var(--accent);
      background: var(--surface);
    }
    .search-input::placeholder { color: var(--text3); }
    .search-wrap { position: relative; }
    .search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 15px; }

    /* SECTION HEADER */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .section-title {
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 700;
    }

    /* AVATAR */
    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 13px;
      font-family: var(--font-display);
    }
    .avatar-row { display: flex; align-items: center; gap: 10px; }
    .avatar-name { font-weight: 500; }
    .avatar-sub { font-size: 12px; color: var(--text2); }

    /* CHECKIN CARD */
    .checkin-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: all 0.15s;
    }
    .checkin-card:hover { border-color: var(--accent); }

    /* FORM */
    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    .form-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      transition: all 0.15s;
    }
    .form-input:focus { outline: none; border-color: var(--accent); }
    .form-input::placeholder { color: var(--text3); }
    select.form-input { cursor: pointer; }

    /* MODAL */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      animation: fadeIn 0.15s ease;
    }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      width: 480px;
      max-width: 95vw;
      animation: slideUp 0.2s ease;
    }
    .modal-title {
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 20px;
    }
    .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }

    @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0 } to { transform: translateY(0); opacity: 1 } }

    /* PROGRESS BAR */
    .progress-bar {
      height: 6px;
      background: var(--surface2);
      border-radius: 3px;
      overflow: hidden;
      margin-top: 8px;
    }
    .progress-fill {
      height: 100%;
      border-radius: 3px;
      background: var(--accent);
    }

    /* TIMELINE */
    .timeline { display: flex; flex-direction: column; gap: 12px; }
    .timeline-item {
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }
    .timeline-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      margin-top: 6px;
      flex-shrink: 0;
    }
    .timeline-time { font-size: 12px; color: var(--text3); margin-top: 2px; }
    .timeline-text { font-size: 13.5px; }

    /* SCROLLBAR */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* PLAN CARD */
    .plan-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      position: relative;
    }
    .plan-card.featured { border-color: var(--accent); }
    .plan-badge {
      position: absolute;
      top: -10px;
      left: 20px;
      background: var(--accent);
      color: var(--bg);
      font-size: 10px;
      font-weight: 700;
      padding: 2px 10px;
      border-radius: 20px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    .plan-name { font-family: var(--font-display); font-size: 18px; font-weight: 700; margin-bottom: 4px; }
    .plan-price { font-size: 28px; font-weight: 800; font-family: var(--font-display); color: var(--accent); }
    .plan-period { font-size: 13px; color: var(--text2); }
    .plan-features { margin-top: 16px; display: flex; flex-direction: column; gap: 8px; }
    .plan-feature { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text2); }

    /* NOTIFICATION DOT */
    .notif-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--danger);
      display: inline-block;
    }

    /* UTILS */
    .flex { display: flex; }
    .flex-col { flex-direction: column; }
    .items-center { align-items: center; }
    .justify-between { justify-content: space-between; }
    .gap-2 { gap: 8px; }
    .gap-4 { gap: 16px; }
    .mb-1 { margin-bottom: 4px; }
    .mb-2 { margin-bottom: 8px; }
    .mb-4 { margin-bottom: 16px; }
    .mb-6 { margin-bottom: 24px; }
    .mt-4 { margin-top: 16px; }
    .text-sm { font-size: 12px; }
    .text-muted { color: var(--text2); }
    .text-accent { color: var(--accent); }
    .font-bold { font-weight: 700; }
    .w-full { width: 100%; }
  </style>
</head>

// ── HELPERS ────────────────────────────────────────────────────────────────
function getBadgeStatus(status) {
  const map = {
    ativo: { cls: 'badge-green', label: 'Ativo' },
    vencido: { cls: 'badge-red', label: 'Vencido' },
    pendente: { cls: 'badge-yellow', label: 'Pendente' },

  };
  return map[status] || map.inativo;

// ── MODAL CADASTRO ALUNO ───────────────────────────────────────────────────
function ModalCadastro({ onClose, onSave }) {
  const [form, setForm] = useState({ nome: '', email: '', telefone: '', plano: 'Mensal' });
  const set = (k) => (e) => setForm(f => ({ ...f, [k]: e.target.value }));

      <div className="modal" onClick={e => e.stopPropagation()}>
        <div className="modal-title">➕ Novo Aluno</div>

            Cadastrar Aluno

function ModalCheckin({ onClose }) {
  const [query, setQuery] = useState('');
  const filtered = MOCK_ALUNOS.filter(a =>
    a.status === 'ativo' && a.nome.toLowerCase().includes(query.toLowerCase())
  );
  const [done, setDone] = useState(null);

  if (done) return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" style={{ textAlign: 'center' }} onClick={e => e.stopPropagation()}>
        <div style={{ fontSize: 56, marginBottom: 16 }}>✅</div>
        <div className="modal-title">Check-in realizado!</div>
        <p style={{ color: 'var(--text2)', marginBottom: 8 }}>{done.nome}</p>
        <p style={{ color: 'var(--accent)', fontFamily: 'var(--font-display)', fontSize: 13 }}>{done.plano}</p>
        <div className="modal-footer" style={{ justifyContent: 'center', marginTop: 24 }}>
          <button className="btn btn-primary" onClick={onClose}>Fechar</button>
        </div>
      </div>
    </div>
  );

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <div className="modal-title">🏃 Registrar Check-in</div>
        <div className="form-group">
          <input className="form-input" placeholder="Buscar aluno pelo nome..." value={query} onChange={e => setQuery(e.target.value)} autoFocus />
        </div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 8, maxHeight: 300, overflowY: 'auto' }}>
          {filtered.map(a => (
            <div key={a.id} className="checkin-card" style={{ cursor: 'pointer' }} onClick={() => setDone(a)}>
              <div className="avatar-row">
                <Avatar initials={a.initials} color={a.avatar} />
                <div>
                  <div className="avatar-name">{a.nome}</div>
                  <div className="avatar-sub">{a.plano} · {a.checkins} check-ins este mês</div>
                </div>
              </div>
              <span className="badge badge-green">Ativo</span>
            </div>
          ))}
          {filtered.length === 0 && <p style={{ color: 'var(--text3)', textAlign: 'center', padding: '20px 0' }}>Nenhum aluno encontrado</p>}
        </div>
        <div className="modal-footer">
          <button className="btn btn-ghost" onClick={onClose}>Cancelar</button>
        </div>
      </div>
    </div>
  );
}

// ── ALUNOS ─────────────────────────────────────────────────────────────────
function Alunos() {
  const [busca, setBusca] = useState('');
  const [filtro, setFiltro] = useState('todos');
  const [modal, setModal] = useState(false);
  const [alunos, setAlunos] = useState(MOCK_ALUNOS);

  const filtered = alunos.filter(a => {
    const matchBusca = a.nome.toLowerCase().includes(busca.toLowerCase()) || a.email.toLowerCase().includes(busca.toLowerCase());
    const matchFiltro = filtro === 'todos' || a.status === filtro;
    return matchBusca && matchFiltro;
  });

  const addAluno = (form) => {
    const colors = ['#c8f135', '#3de8a0', '#38bdf8', '#f472b6', '#fb923c'];
    const initials = form.nome.split(' ').slice(0, 2).map(n => n[0]).join('').toUpperCase();
    setAlunos(prev => [...prev, {
      id: Date.now(), ...form, status: 'ativo',
      vencimento: '2026-03-20', avatar: colors[Math.floor(Math.random() * colors.length)],
      initials, checkins: 0, desde: 'Fev 2026'
    }]);
  };

  return (
    <div>
      {modal && <ModalCadastro onClose={() => setModal(false)} onSave={addAluno} />}

      <div className="section-header mb-4">
        <div style={{ display: 'flex', gap: 8 }}>
          {['todos', 'ativo', 'vencido', 'pendente'].map(f => (
            <button
              key={f}
              onClick={() => setFiltro(f)}
              className="btn"
              style={{
                background: filtro === f ? 'rgba(200,241,53,0.1)' : 'transparent',
                color: filtro === f ? 'var(--accent)' : 'var(--text2)',
                border: `1px solid ${filtro === f ? 'var(--accent)' : 'var(--border)'}`,
                padding: '7px 14px', fontSize: 12, fontWeight: 600, textTransform: 'capitalize'
              }}
            >
              {f === 'todos' ? `Todos (${alunos.length})` : f === 'ativo' ? `Ativos (${alunos.filter(a=>a.status==='ativo').length})` : f === 'vencido' ? `Vencidos (${alunos.filter(a=>a.status==='vencido').length})` : `Pendentes (${alunos.filter(a=>a.status==='pendente').length})`}
            </button>
          ))}
        </div>
        <div style={{ display: 'flex', gap: 10 }}>
          <div className="search-wrap">
            <span className="search-icon">🔍</span>
            <input
              className="search-input"
              placeholder="Buscar aluno..."
              value={busca}
              onChange={e => setBusca(e.target.value)}
            />
          </div>
          <button className="btn btn-primary" onClick={() => setModal(true)}>
            + Novo Aluno
          </button>
        </div>
      </div>

      <div className="table-container">
        <table>
          <thead>
            <tr>
              <th>Aluno</th>
              <th>Telefone</th>
              <th>Plano</th>
              <th>Vencimento</th>
              <th>Check-ins</th>
              <th>Status</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody>
            {filtered.map(a => {
              const b = getBadgeStatus(a.status);
              return (
                <tr key={a.id}>
                  <td>
                    <div className="avatar-row">
                      <Avatar initials={a.initials} color={a.avatar} />
                      <div>
                        <div className="avatar-name">{a.nome}</div>
                        <div className="avatar-sub">{a.email}</div>
                      </div>
                    </div>
                  </td>
                  <td style={{ color: 'var(--text2)' }}>{a.telefone}</td>
                  <td>{a.plano}</td>
                  <td style={{ color: a.status === 'vencido' ? 'var(--danger)' : 'var(--text2)' }}>{a.vencimento}</td>
                  <td>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                      <span style={{ fontFamily: 'var(--font-display)', fontWeight: 700 }}>{a.checkins}</span>
                      <div style={{ flex: 1, minWidth: 60 }}>
                        <div className="progress-bar">
                          <div className="progress-fill" style={{ width: `${Math.min(a.checkins / 26 * 100, 100)}%` }}></div>
                        </div>
                      </div>
                    </div>
                  </td>
                  <td><span className={`badge ${b.cls}`}>{b.label}</span></td>
                  <td>
                    <div style={{ display: 'flex', gap: 6 }}>
                      <button className="btn btn-ghost" style={{ padding: '5px 10px', fontSize: 12 }}>✏️</button>
                      <button className="btn btn-ghost" style={{ padding: '5px 10px', fontSize: 12 }}>💬</button>
                    </div>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
        {filtered.length === 0 && (
          <div style={{ textAlign: 'center', padding: '40px', color: 'var(--text3)' }}>
            Nenhum aluno encontrado
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
