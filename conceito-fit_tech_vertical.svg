<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 360" role="img" aria-label="conceito.fit"
     style="--ink:#0F172A; --accent:#22C55E;">
  <!-- Icon -->
  <g transform="translate(58 28) scale(0.80)">
    <circle cx="128" cy="128" r="92"
            fill="none" stroke="var(--ink)" stroke-width="18" stroke-linecap="round"
            stroke-dasharray="430 148" transform="rotate(-12 128 128)"/>
    <line x1="88" y1="128" x2="168" y2="128"
          stroke="var(--ink)" stroke-width="14" stroke-linecap="round"/>
    <line x1="64" y1="102" x2="64" y2="154"
          stroke="var(--ink)" stroke-width="14" stroke-linecap="round"/>
    <line x1="48" y1="96"  x2="48" y2="160"
          stroke="var(--ink)" stroke-width="14" stroke-linecap="round"/>
    <line x1="192" y1="102" x2="192" y2="154"
          stroke="var(--ink)" stroke-width="14" stroke-linecap="round"/>
    <line x1="208" y1="96"  x2="208" y2="160"
          stroke="var(--ink)" stroke-width="14" stroke-linecap="round"/>
    <circle cx="214" cy="128" r="9" fill="var(--accent)"/>
  </g>

  <!-- Wordmark -->
  <text x="160" y="320"
        text-anchor="middle"
        font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif"
        font-size="56" font-weight="600" fill="var(--ink)">
    conceito<tspan font-weight="800" fill="var(--accent)">.fit</tspan>
  </text>
</svg>
